services:
  backend:
    build:
      context: ./backend
    container_name: tada-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - /opt/tada/.env
    environment:
      - PORT=3001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tada_network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tada-redis
    restart: unless-stopped
    command: sh -c "redis-server --requirepass $$REDIS_PASSWORD --maxmemory 128mb --maxmemory-policy allkeys-lru"
    ports:
      - "127.0.0.1:6379:6379"
    env_file:
      - /opt/tada/.env
    volumes:
      - redis_data:/data
    networks:
      - tada_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  tada_network:
    driver: bridge

volumes:
  redis_data:
